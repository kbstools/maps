<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King's Bakeshop - Custom Map Network</title>
    
    <!-- Tailwind CSS for sidebar & panel grids -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS for smooth map plotting -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- FontAwesome for interactive navigation icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Inter Font Family -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
        }
        #map {
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }
        .custom-div-icon {
            background: none;
            border: none;
        }
        /* Active Selection Ring (mirrors the halo shown in image_db3751.jpg) */
        .active-pin-halo {
            position: relative;
        }
        .active-pin-halo::before {
            content: '';
            position: absolute;
            top: -12px;
            left: -12px;
            width: 58px;
            height: 58px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid #ffffff;
            border-radius: 50%;
            z-index: -1;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            animation: pulse-ring 2s infinite ease-out;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.15); opacity: 0; }
        }
        /* Custom sidebar panel styling (matches image_db3751.jpg) */
        #detail-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.15);
        }
        .sidebar-hidden {
            transform: translateX(-105%);
        }
        .sidebar-visible {
            transform: translateX(0);
        }
        .floating-control-btn {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 9999px;
            padding: 10px 18px;
            font-size: 11px;
            font-weight: 600;
            color: #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .floating-control-btn:hover {
            transform: translateY(-2px);
            color: #ea580c;
            border-color: #ffedd5;
        }
        @keyframes loading-progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        .loader-bar {
            animation: loading-progress 1.6s infinite ease-in-out;
        }
    </style>
</head>
<body class="relative h-screen w-screen select-none">

    <!-- Left Google-My-Maps Style Sidebar (resembling layout in image_db3751.jpg) -->
    <div id="detail-sidebar" class="absolute left-0 top-0 bottom-0 w-full sm:w-[380px] bg-white z-[1000] flex flex-col sidebar-hidden">
        
        <!-- Top Branch Photo -->
        <div class="w-full h-52 relative bg-slate-100 overflow-hidden shrink-0">
            <img id="sidebar-photo" src="" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=600&auto=format&fit=crop'">
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
        </div>

        <!-- Red Navigation Header (Mirrors image_db3751.jpg style exactly) -->
        <div class="bg-[#c62828] text-white p-4 flex items-center justify-between shadow-md shrink-0">
            <div class="flex items-center gap-3 min-w-0">
                <button onclick="closeSidebar()" class="p-1.5 hover:bg-black/10 rounded-full transition-all text-white flex items-center justify-center" title="Bumalik">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </button>
                <div class="min-w-0">
                    <p class="text-[11px] text-red-200 uppercase tracking-wider font-semibold">King's Bakeshop</p>
                    <h3 id="sidebar-title" class="font-bold text-sm sm:text-base leading-tight truncate">Store Name</h3>
                </div>
            </div>
            <a id="sidebar-directions-btn" href="#" target="_blank" class="w-10 h-10 bg-white hover:bg-slate-100 text-[#c62828] rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-all shrink-0 ml-2" title="Kumuha ng Direksyon">
                <i class="fa-solid fa-diamond-turn-right text-lg"></i>
            </a>
        </div>

        <!-- Sidebar Content Body -->
        <div class="flex-1 overflow-y-auto p-5 space-y-5">
            <!-- Label Item -->
            <div>
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Pangalan</span>
                <p id="sidebar-meta-name" class="text-sm font-semibold text-slate-800 mt-1">King's Bakeshop</p>
            </div>

            <!-- Custom Info Segment -->
            <div class="border-t border-slate-100 pt-4">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider font-semibold">Mga detalye mula sa Google Maps</span>
                
                <div class="mt-3 space-y-4 font-normal">
                    <!-- Address Block -->
                    <div class="flex items-start gap-3">
                        <div class="text-[#c62828] mt-0.5"><i class="fa-solid fa-location-dot"></i></div>
                        <p id="sidebar-address" class="text-xs text-slate-600 leading-relaxed">Niloload...</p>
                    </div>

                    <!-- Contact Block -->
                    <div class="flex items-center gap-3">
                        <div class="text-[#c62828]"><i class="fa-solid fa-phone"></i></div>
                        <p id="sidebar-phone" class="text-xs text-slate-600">Niloload...</p>
                    </div>
                </div>
            </div>

            <!-- Additional description box -->
            <div id="sidebar-desc-container" class="border-t border-slate-100 pt-4 hidden">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Karagdagang Impormasyon</span>
                <p id="sidebar-description" class="text-xs text-slate-600 mt-2 leading-relaxed"></p>
            </div>
        </div>
    </div>

    <!-- Map Canvas Elements -->
    <div id="map"></div>

    <!-- Floating Style / Layer Controller -->
    <div class="absolute bottom-6 left-6 z-[900] flex flex-col gap-3">
        <button id="layer-toggle-btn" class="floating-control-btn">
            <i class="fa-solid fa-earth-asia text-orange-500 text-[13px]"></i> <span>Switch to Satellite Imagery</span>
        </button>
    </div>

    <!-- Interactive Synchronization Overlay -->
    <div id="loading-overlay" class="absolute inset-0 bg-slate-950/90 backdrop-blur-md z-[2000] flex flex-col items-center justify-center transition-all duration-700">
        <div class="text-center p-8 bg-white/95 rounded-2xl shadow-2xl max-w-sm border border-slate-100 mx-4">
            <div class="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner animate-pulse">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
            <h2 class="text-base font-bold text-slate-800">Syncing Live Map Data</h2>
            <p id="loading-status" class="text-[11px] text-slate-400 mt-1 leading-relaxed">Connecting directly to your live Google My Maps layers...</p>
            
            <div class="w-full bg-slate-100 h-1.5 rounded-full mt-5 overflow-hidden">
                <div class="bg-orange-500 h-full w-1/3 loader-bar rounded-full"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GOOGLE_MAP_ID = "1zwlBnn2gCZ6pQKwjqe_u2SBOLN-1z-k";
        const DIRECT_KML_URL = `https://www.google.com/maps/d/u/0/kml?mid=${GOOGLE_MAP_ID}&forcekml=1`;
        const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(DIRECT_KML_URL)}`;
        
        var map;
        var activeMarkers = [];
        var streetLayer;
        var satelliteLayer;
        var currentTheme = 'street'; 
        var activeMarkerNode = null;
        var addressCache = {}; // Cache to prevent repeat geocoding calls

        // High-fidelity local database matching known King's Bakeshop branch locations (fixes Google export issues)
        const LOCAL_BRANCH_DIRECTORY = {
            "retiro": {
                address: "N.S. Amoranto Sr. St. (Retiro) cor. D. Tuazon St., Quezon City, Metro Manila",
                phone: "+63 2 8330 4678",
                img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=600&auto=format&fit=crop"
            },
            "recto": {
                address: "Upper Ground Floor, 999 Shopping Mall Phase II, Recto Ave, Binondo, Manila, 1006 Metro Manila",
                phone: "+63 917 109 4128",
                img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=600&auto=format&fit=crop"
            },
            "masangkay": {
                address: "1417 Masangkay St., Tondo, Manila, 1012 Metro Manila, Philippines",
                phone: "+63 2 8330 4678",
                img: "https://images.unsplash.com/photo-1549931319-a545dcf3bc73?q=80&w=600&auto=format&fit=crop"
            },
            "tondo": {
                address: "ZONE 1, 564 Lakandula St, Plaza Leon, Tondo, Manila, 1012 Metro Manila",
                phone: "+63 917 703 4538",
                img: "https://images.unsplash.com/photo-1517433456452-f9633a875f6f?q=80&w=600&auto=format&fit=crop"
            },
            "tutuban": {
                address: "2/F Tutuban Center Mall, Tondo, Manila, 1012 Kalakhang Maynila, Philippines",
                phone: "+63 2 8330 4678",
                img: "https://images.unsplash.com/photo-1498804103079-a6351b050096?q=80&w=600&auto=format&fit=crop"
            },
            "pasay": {
                address: "Unit GA 03 Ground Floor, Victory Mall Pasay Libertad, cor. Taft Ave, Pasay City, 1300 Metro Manila",
                phone: "+63 917 631 6012",
                img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=600&auto=format&fit=crop"
            },
            "divisoria": {
                address: "3rd Floor, New Divisoria Mall, M. De Santos St, San Nicolas, Manila, 1006 Metro Manila",
                phone: "+63 917 110 0816",
                img: "https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=600&auto=format&fit=crop"
            }
        };

        // General curated fallbacks for newly created/unlisted custom branches
        const CURATED_IMAGE_RESOURCES = [
            "https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=600&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=600&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1549931319-a545dcf3bc73?q=80&w=600&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1517433456452-f9633a875f6f?q=80&w=600&auto=format&fit=crop",
            "https://images.unsplash.com/photo-1498804103079-a6351b050096?q=80&w=600&auto=format&fit=crop"
        ];

        window.onload = function() {
            // Setup Map viewport centered over Metro Manila
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([14.5995, 120.9842], 12);

            // 1. Clean Vector Map
            streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            });

            // 2. High-Resolution Satellite View
            satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            });

            streetLayer.addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            document.getElementById('layer-toggle-btn').addEventListener('click', toggleMapLayer);

            // Fetch live Google My Maps stream
            loadLiveGoogleDataset();
        };

        function toggleMapLayer() {
            const btnText = document.querySelector('#layer-toggle-btn span');
            const btnIcon = document.querySelector('#layer-toggle-btn i');
            
            if (currentTheme === 'street') {
                map.removeLayer(streetLayer);
                satelliteLayer.addTo(map);
                currentTheme = 'satellite';
                btnText.textContent = "Switch to Vector Map";
                btnIcon.className = "fa-solid fa-map text-orange-500 text-[13px]";
            } else {
                map.removeLayer(satelliteLayer);
                streetLayer.addTo(map);
                currentTheme = 'street';
                btnText.textContent = "Switch to Satellite Imagery";
                btnIcon.className = "fa-solid fa-earth-asia text-orange-500 text-[13px]";
            }
        }

        function loadLiveGoogleDataset() {
            const statusEl = document.getElementById('loading-status');
            statusEl.textContent = "Connecting to Google Maps directory...";
            
            fetch(PROXY_URL)
                .then(response => {
                    if (!response.ok) throw new Error("CORS Proxy retrieval failed");
                    statusEl.textContent = "Parsing live bakeshop locations...";
                    return response.text();
                })
                .then(kmlContent => {
                    const locations = parseKML(kmlContent);
                    if (locations.length > 0) {
                        plotMarkers(locations);
                        hideLoader();
                    } else {
                        throw new Error("No branches parsed from Google stream.");
                    }
                })
                .catch(err => {
                    console.error("Live Google My Maps Sync failed, using local fallback...", err);
                    statusEl.textContent = "Using cached offline layers...";
                    // Fallback to local map.kml if present in directory
                    fetch('map.kml')
                        .then(res => res.text())
                        .then(fallbackText => {
                            const fallbackLocs = parseKML(fallbackText);
                            plotMarkers(fallbackLocs);
                            hideLoader();
                        })
                        .catch(err2 => {
                            statusEl.innerHTML = "<span class='text-red-500 font-semibold'>Offline: Connect your repo to map.kml or internet.</span>";
                        });
                });
        }

        // Parse coordinates and basic structures out of Google's KML export
        function parseKML(kmlText) {
            var points = [];
            try {
                var parser = new DOMParser();
                var xmlDoc = parser.parseFromString(kmlText, "text/xml");
                var placemarks = xmlDoc.getElementsByTagName("Placemark");

                for (let i = 0; i < placemarks.length; i++) {
                    let pm = placemarks[i];
                    let rawName = pm.getElementsByTagName("name")[0]?.textContent || "King's Bakeshop";
                    
                    // Clean trailing dashes or numbers in the name
                    let name = rawName.replace(/\s*-\s*$/, "").trim();
                    let descNode = pm.getElementsByTagName("description")[0]?.textContent || "";
                    
                    // Retrieve structured metadata fields directly if exported from Google My Maps database
                    let address = "";
                    let phone = "";
                    let imgUrl = "";
                    let cleanDesc = "";

                    // Attempt matching this branch from our local metadata dictionary to bypass Google's export limitations
                    const lowerName = name.toLowerCase();
                    let localMatch = null;
                    for (const key in LOCAL_BRANCH_DIRECTORY) {
                        if (lowerName.includes(key)) {
                            localMatch = LOCAL_BRANCH_DIRECTORY[key];
                            break;
                        }
                    }

                    if (localMatch) {
                        address = localMatch.address;
                        phone = localMatch.phone;
                        imgUrl = localMatch.img;
                    }

                    // Parse any embedded coordinates
                    let coordNode = pm.getElementsByTagName("coordinates")[0];
                    if (coordNode) {
                        let coordStr = coordNode.textContent.trim();
                        let parts = coordStr.split(",");
                        if (parts.length >= 2) {
                            let lng = parseFloat(parts[0].trim());
                            let lat = parseFloat(parts[1].trim());
                            if (!isNaN(lat) && !isNaN(lng)) {
                                
                                // Assign distinct curated images based on branch indexing
                                if (!imgUrl) {
                                    imgUrl = CURATED_IMAGE_RESOURCES[i % CURATED_IMAGE_RESOURCES.length];
                                }

                                points.push({ 
                                    name: name, 
                                    desc: cleanDesc.trim() || "King's Bakeshop branch outlet.", 
                                    address: address,
                                    phone: phone || "+63 2 8330 4678",
                                    img: imgUrl, 
                                    lat: lat, 
                                    lng: lng 
                                });
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("KML Parse Failure:", err);
            }
            return points;
        }

        function plotMarkers(locations) {
            activeMarkers.forEach(m => map.removeLayer(m));
            activeMarkers = [];
            var bounds = [];

            locations.forEach(loc => {
                // Custom pin style
                var svgPin = `
                    <div class="pin-container flex flex-col items-center justify-center">
                        <div class="bg-gradient-to-br from-amber-500 to-orange-600 text-white rounded-full p-2.5 shadow-lg border-2 border-white hover:scale-110 transition-transform duration-200">
                            <i class="fa-solid fa-store text-[11px]"></i>
                        </div>
                        <div class="w-2 h-2 bg-orange-600 border border-white rotate-45 -mt-[3px] shadow"></div>
                    </div>
                `;

                var customIcon = L.divIcon({
                    html: svgPin,
                    className: 'custom-div-icon',
                    iconSize: [34, 34],
                    iconAnchor: [17, 34]
                });

                var marker = L.marker([loc.lat, loc.lng], { icon: customIcon }).addTo(map);

                marker.on('click', function() {
                    openSidebar(loc, marker);
                });

                activeMarkers.push(marker);
                bounds.push([loc.lat, loc.lng]);
            });

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            }
        }

        function openSidebar(loc, marker) {
            // Remove previous focus states
            if (activeMarkerNode) {
                const el = activeMarkerNode.getElement();
                if (el) el.classList.remove('active-pin-halo');
            }

            // Apply focus selection halo (corresponds to image_db3751.jpg highlight)
            activeMarkerNode = marker;
            const el = marker.getElement();
            if (el) {
                el.classList.add('active-pin-halo');
            }

            // Populate Sidebar Elements
            document.getElementById('sidebar-photo').src = loc.img;
            document.getElementById('sidebar-title').textContent = loc.name;
            document.getElementById('sidebar-meta-name').textContent = loc.name;
            document.getElementById('sidebar-phone').textContent = loc.phone;

            var addressEl = document.getElementById('sidebar-address');

            // If we already have a hardcoded address, show it instantly
            if (loc.address) {
                addressEl.textContent = loc.address;
            } else {
                // Fallback: Dynamic Reverse-Geocoding (OSM Nominatim) to fetch actual street address on the fly
                const cacheKey = `${loc.lat},${loc.lng}`;
                if (addressCache[cacheKey]) {
                    addressEl.textContent = addressCache[cacheKey];
                } else {
                    addressEl.textContent = "Loading precise address...";
                    
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lng}&zoom=18&addressdetails=1`)
                        .then(response => response.json())
                        .then(data => {
                            if (data && data.display_name) {
                                // Extract and clean address labels
                                let cleanAddr = data.display_name.replace(", Philippines", "").trim();
                                addressCache[cacheKey] = cleanAddr;
                                addressEl.textContent = cleanAddr;
                            } else {
                                throw new Error("Geocoding empty response");
                            }
                        })
                        .catch(error => {
                            console.error("Nominatim Reverse-Geocoding failed:", error);
                            addressEl.textContent = "Manila, Metro Manila, Philippines";
                        });
                }
            }

            var directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}`;
            document.getElementById('sidebar-directions-btn').href = directionsUrl;

            // Optional description display
            var descContainer = document.getElementById('sidebar-desc-container');
            if (loc.desc && loc.desc.length > 3 && !loc.desc.includes("King's Bakeshop branch outlet")) {
                document.getElementById('sidebar-description').textContent = loc.desc;
                descContainer.classList.remove('hidden');
            } else {
                descContainer.classList.add('hidden');
            }

            // Slide open the drawer panel
            var sidebar = document.getElementById('detail-sidebar');
            sidebar.classList.remove('sidebar-hidden');
            sidebar.classList.add('sidebar-visible');

            // Slightly offset center pan so map looks balanced with sidebar open
            var latOffset = loc.lat;
            var lngOffset = window.innerWidth > 640 ? loc.lng - 0.015 : loc.lng;
            map.panTo([latOffset, lngOffset], { animate: true, duration: 0.6 });
        }

        function closeSidebar() {
            var sidebar = document.getElementById('detail-sidebar');
            sidebar.classList.add('sidebar-hidden');
            sidebar.classList.remove('sidebar-visible');

            // Clear selected marker halo
            if (activeMarkerNode) {
                const el = activeMarkerNode.getElement();
                if (el) el.classList.remove('active-pin-halo');
                activeMarkerNode = null;
            }
        }

        function hideLoader() {
            var loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 700);
        }
    </script>
</body>
</html>
